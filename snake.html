<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>snake.exe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --phosphor: #39FF6A;
    --phosphor-dim: rgba(57,255,106,.4);
    --phosphor-faint: rgba(57,255,106,.18);
    --bg: #030502;
    --ink: #020402;
    --font-term: 'VT323', monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background: var(--bg); color: var(--phosphor); font-family: var(--font-term);
    font-size: 1.18rem; min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .mono-up{ text-transform:uppercase; }

  .game-box{ position:relative; border:1px solid var(--phosphor-dim); padding:1.5rem; background:var(--ink); }
  .game-box.powered{ --phosphor: #33B5FF; --phosphor-dim: rgba(51,181,255,.4); --phosphor-faint: rgba(51,181,255,.18); }
  .game-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.75rem; gap:1rem; }
  .game-top .title{ font-size:1.3rem; }
  canvas{ display:block; background:#040904; border:1px solid var(--phosphor-faint); }
  .game-footer{ display:flex; justify-content:space-between; margin-top:.6rem; font-size:.95rem; color:var(--phosphor-dim); }
  .game-msg{ text-align:center; margin-top:.75rem; min-height:1.4em; cursor:pointer; }
  .lore-text{ margin-top:1.25rem; font-size:.85rem; line-height:1.6; color:var(--phosphor-dim); text-align:center; }
  .dpad{
    display:grid; grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px;
    grid-template-areas: ". up ." "left down right";
    gap:.4rem; justify-content:center; margin-top:1rem;
  }
  .dpad-btn{
    background:none; border:1px solid var(--phosphor-dim); color:var(--phosphor);
    font-size:1.2rem; cursor:pointer; touch-action:manipulation; user-select:none;
  }
  .dpad-btn:active{ background:var(--phosphor); color:var(--ink); }
  .dpad-up{ grid-area:up; } .dpad-left{ grid-area:left; }
  .dpad-down{ grid-area:down; } .dpad-right{ grid-area:right; }

  /* ---------- quick-reference key for new players ---------- */
  .game-key{
    display:flex; flex-wrap:wrap; justify-content:center; gap:.5rem 1rem;
    margin-top:1rem; padding-top:.85rem; border-top:1px dashed var(--phosphor-faint);
    font-size:.85rem; color:var(--phosphor-dim);
  }
  .game-key .key-item{ display:flex; align-items:center; gap:.4rem; white-space:nowrap; }
  .game-key .key-swatch{ width:.85em; height:.85em; flex:none; display:inline-block; box-shadow:0 0 4px currentColor; }
  .key-swatch.good{ background:#FFB300; color:#FFB300; }
  .key-swatch.power{ background:#33B5FF; color:#33B5FF; }
  .key-swatch.bad{ background:#FF3B3B; color:#FF3B3B; }
  .key-swatch.enemy{ background:#1B5E20; color:#1B5E20; }

  /* ---------- leaderboard panel (shown on game over) ---------- */
  .lb-panel{ margin-top:1rem; border-top:1px dashed var(--phosphor-dim); padding-top:1rem; }
  .lb-panel[hidden]{ display:none; }
  .lb-title{ font-size:1.1rem; text-align:center; margin-bottom:.6rem; color:var(--phosphor); }
  .lb-entry-form{ display:flex; gap:.5rem; justify-content:center; align-items:center; margin-bottom:.9rem; }
  .lb-entry-form input{
    background:none; border:none; border-bottom:1px solid var(--phosphor); color:var(--phosphor);
    font-family:var(--font-term); font-size:1.1rem; outline:none; width:120px; padding:.1rem .25rem; letter-spacing:.1em; text-transform:uppercase;
  }
  .lb-entry-form button{ font:inherit; background:none; border:1px solid var(--phosphor); color:inherit; cursor:pointer; padding:.25rem .6rem; transition: background .12s, color .12s; font-size:.95rem; }
  .lb-entry-form button:hover{ background:var(--phosphor); color:var(--ink); }
  .lb-list{ list-style:none; font-size:1rem; max-width:280px; margin:0 auto; }
  .lb-list li{ display:flex; justify-content:space-between; gap:1rem; padding:.15rem 0; }
  .lb-list li .lb-rank{ color:var(--phosphor-dim); width:1.6em; }
  .lb-list li .lb-name{ flex:1; }
  .lb-status{ text-align:center; font-size:.85rem; color:var(--phosphor-dim); min-height:1.2em; margin-top:.4rem; }
</style>
</head>
<body>

<div class="game-box" id="gameBox">
  <div class="game-top">
    <span class="title mono-up">snake.exe</span>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="game-footer">
    <span id="scoreLabel">SCORE: 000</span>
    <span id="sectorLabel">SECTOR: 00,00</span>
    <span>ARROWS / WASD TO MOVE</span>
  </div>
  <div class="game-msg" id="gameMsg"></div>
  <div class="dpad" id="dpad" aria-hidden="true">
    <button class="dpad-btn dpad-up" data-dir="up" type="button">▲</button>
    <button class="dpad-btn dpad-left" data-dir="left" type="button">◀</button>
    <button class="dpad-btn dpad-down" data-dir="down" type="button">▼</button>
    <button class="dpad-btn dpad-right" data-dir="right" type="button">▶</button>
  </div>
  <p class="lore-text">You are a hungry little 8-bit program, feeding on stray data in the archive.<br>Be aware, you're not the only hungry thing in the files.</p>

  <div class="game-key">
    <span class="key-item"><span class="key-swatch good"></span>FOOD (+1)</span>
    <span class="key-item"><span class="key-swatch power"></span>POWER-UP</span>
    <span class="key-item"><span class="key-swatch bad"></span>POISON (-1)</span>
    <span class="key-item"><span class="key-swatch enemy"></span>ENEMY</span>
  </div>

  <div class="lb-panel" id="lbPanel" hidden>
    <div class="lb-title mono-up">Top 5 Operators</div>
    <form class="lb-entry-form" id="lbForm" hidden>
      <span class="dim" style="color:var(--phosphor-dim)">NAME:</span>
      <input id="lbNameInput" type="text" maxlength="12" autocomplete="off" spellcheck="false">
      <button type="submit">SUBMIT</button>
    </form>
    <ol class="lb-list" id="lbList"></ol>
    <div class="lb-status" id="lbStatus"></div>
  </div>
</div>

<script>

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreLabel = document.getElementById('scoreLabel');
  const sectorLabel = document.getElementById('sectorLabel');
  const msgEl = document.getElementById('gameMsg');
  const gameBox = document.getElementById('gameBox');

  const VIEW = 20;              // visible cells on screen at once
  const CELL = canvas.width / VIEW;
  const WORLD_W = 50, WORLD_H = 50;   // bigger world than before
  const N_OBSTACLES = 10;             // fewer single-cell obstacles now that shaped walls exist
  const N_WALL_SHAPES = 7;            // L / I / Z shaped walls
  const N_POISON = 4;
  const N_GOOD = 2;                   // reduced by 50% (was 5; halved and rounded down)
  const N_POWER = 1;
  const POWER_DURATION = 45;  // shortened from 80 — roughly half as long
  const POWER_ENDING_WINDOW = 15; // last ~1.6s of the power window flashes as a warning
  const ENEMY_LEN = 2;
  const BITE_PENALTY = 2;
  const HUNT_TICKS = 70;     // ~7.7s of active chasing before it gives up
  const WANDER_TICKS = 50;   // ~5.5s disengaged before it resumes hunting
  const CHASE_MISTAKE_CHANCE = 0.18; // chance per move it picks a random direction instead of the optimal one

  let snake, dir, nextDir, goodFoods, poisonFoods, powerFoods, obstacles, score, loopId, running, tickCount, cam;
  let enemy, enemyDir, enemyState, enemyTimer, poweredUntilTick, biteCooldown;

  function wrappedDelta(a, b, size){
    // shortest signed distance from a to b on a wrapping world
    let d = b - a;
    d = ((d + size/2) % size + size) % size - size/2;
    return d;
  }

  function key(x, y){ return x + ',' + y; }
  function wrap(v, size){ return ((v % size) + size) % size; }

  // base shapes as (col,row) offsets; rotated randomly 0-270deg at placement time
  const WALL_SHAPES = [
    [[0,0],[1,0],[2,0],[3,0]],   // I
    [[0,0],[0,1],[0,2],[1,2]],   // L
    [[0,0],[1,0],[1,1],[2,1]],   // Z
  ];
  function rotateShape(shape, times){
    let s = shape;
    for (let t = 0; t < times; t++) s = s.map(([x,y]) => [-y, x]);
    const minX = Math.min(...s.map(c => c[0]));
    const minY = Math.min(...s.map(c => c[1]));
    return s.map(([x,y]) => [x - minX, y - minY]);
  }

  function resetGame(){
    snake = [{x:25,y:25},{x:24,y:25},{x:23,y:25}];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    running = true;
    tickCount = 0;
    msgEl.textContent = '';
    scoreLabel.textContent = 'SCORE: 000';
    scoreSubmittedThisRun = false;
    if (typeof lbPanel !== 'undefined' && lbPanel) lbPanel.hidden = true;

    obstacles = new Set();
    const occupied = new Set(snake.map(s => key(s.x, s.y)));
    const safe = (x, y) => Math.abs(x - 25) < 5 && Math.abs(y - 25) < 5;

    let shapesPlaced = 0, shapeAttempts = 0;
    while (shapesPlaced < N_WALL_SHAPES && shapeAttempts < 500){
      shapeAttempts++;
      const base = WALL_SHAPES[Math.floor(Math.random() * WALL_SHAPES.length)];
      const cells = rotateShape(base, Math.floor(Math.random() * 4));
      const ax = Math.floor(Math.random() * WORLD_W);
      const ay = Math.floor(Math.random() * WORLD_H);
      const worldCells = cells.map(([dx, dy]) => [ax + dx, ay + dy]);
      const fits = worldCells.every(([x, y]) =>
        x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H &&
        !safe(x, y) && !occupied.has(key(x, y))
      );
      if (!fits) continue;
      worldCells.forEach(([x, y]) => { occupied.add(key(x, y)); obstacles.add(key(x, y)); });
      shapesPlaced++;
    }

    while (obstacles.size < N_OBSTACLES){
      const x = Math.floor(Math.random() * WORLD_W);
      const y = Math.floor(Math.random() * WORLD_H);
      if (safe(x, y) || occupied.has(key(x, y))) continue;
      obstacles.add(key(x, y));
    }

    poisonFoods = [];
    while (poisonFoods.length < N_POISON){
      const x = Math.floor(Math.random() * WORLD_W);
      const y = Math.floor(Math.random() * WORLD_H);
      if (safe(x, y) || occupied.has(key(x, y)) || obstacles.has(key(x, y))) continue;
      if (poisonFoods.some(p => p.x === x && p.y === y)) continue;
      poisonFoods.push({x, y});
    }

    placeGoodFoods();
    placePowerFoods();
    poweredUntilTick = -1;
    biteCooldown = 0;

    spawnEnemy(occupied);
    updateCamera();
  }

  function spawnEnemy(occupied){
    let ex, ey, tries = 0;
    do {
      ex = Math.floor(Math.random() * WORLD_W);
      ey = Math.floor(Math.random() * WORLD_H);
      tries++;
    } while (tries < 300 && ((occupied && occupied.has(key(ex,ey))) || obstacles.has(key(ex,ey)) ||
              Math.abs(wrappedDelta(ex, snake[0].x, WORLD_W)) + Math.abs(wrappedDelta(ey, snake[0].y, WORLD_H)) < 15));
    enemy = [];
    for (let i = 0; i < ENEMY_LEN; i++) enemy.push({ x: wrap(ex + i, WORLD_W), y: ey });
    enemyDir = {x:-1,y:0};
    enemyState = 'hunt';
    enemyTimer = HUNT_TICKS;
  }

  function growEnemy(n){
    const tail = enemy[enemy.length - 1];
    for (let i = 0; i < n; i++) enemy.push({ x: tail.x, y: tail.y });
  }

  function growSnake(n){
    const tail = snake[snake.length - 1];
    for (let i = 0; i < n; i++) snake.push({ x: tail.x, y: tail.y });
  }

  function isBlocked(x, y){
    if (obstacles.has(key(x, y))) return true;
    if (snake.some(s => s.x === x && s.y === y)) return true;
    return false;
  }

  function randomFreeCell(){
    let p;
    do {
      p = { x: Math.floor(Math.random()*WORLD_W), y: Math.floor(Math.random()*WORLD_H) };
    } while (isBlocked(p.x, p.y) || poisonFoods.some(f => f.x === p.x && f.y === p.y) ||
             (goodFoods && goodFoods.some(f => f.x === p.x && f.y === p.y)) ||
             (powerFoods && powerFoods.some(f => f.x === p.x && f.y === p.y)));
    return p;
  }

  function placeGoodFoods(){
    goodFoods = [];
    while (goodFoods.length < N_GOOD) goodFoods.push(randomFreeCell());
  }

  function placePowerFoods(){
    powerFoods = [];
    while (powerFoods.length < N_POWER) powerFoods.push(randomFreeCell());
  }

  function wanderTo(item, avoidGoodFoods){
    // wanders one cell randomly, wrapping at world edges; if every direction is blocked it stays put
    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].sort(() => Math.random() - 0.5);
    for (const d of dirs){
      const nx = wrap(item.x + d.x, WORLD_W), ny = wrap(item.y + d.y, WORLD_H);
      if (isBlocked(nx, ny)) continue;
      if (poisonFoods.some(f => f.x === nx && f.y === ny)) continue;
      if (avoidGoodFoods && goodFoods.some(f => f.x === nx && f.y === ny)) continue;
      item.x = nx; item.y = ny;
      return;
    }
  }

  function moveGoodFoods(){ goodFoods.forEach(f => wanderTo(f, true)); }
  function movePoisonFoods(){ poisonFoods.forEach(f => wanderTo(f, false)); }

  function moveEnemy(){
    enemyTimer--;
    if (enemyState === 'retreat' && enemyTimer <= 0){
      enemyState = 'wander';
      enemyTimer = WANDER_TICKS;
    } else if (enemyState === 'hunt' && enemyTimer <= 0){
      enemyState = 'wander';
      enemyTimer = WANDER_TICKS;
    } else if (enemyState === 'wander' && enemyTimer <= 0){
      enemyState = 'hunt';
      enemyTimer = HUNT_TICKS;
    }

    const head = enemy[0];
    const candidates = [];

    if (enemyState === 'retreat'){
      const target = snake[0];
      const dx = wrappedDelta(head.x, target.x, WORLD_W);
      const dy = wrappedDelta(head.y, target.y, WORLD_H);
      // move away: pick the axis with the larger gap and step in the opposite direction
      if (Math.abs(dx) >= Math.abs(dy)){
        if (dx !== 0) candidates.push({x: dx > 0 ? -1 : 1, y:0});
        if (dy !== 0) candidates.push({x:0, y: dy > 0 ? -1 : 1});
      } else {
        if (dy !== 0) candidates.push({x:0, y: dy > 0 ? -1 : 1});
        if (dx !== 0) candidates.push({x: dx > 0 ? -1 : 1, y:0});
      }
    } else if (enemyState === 'hunt' && Math.random() > CHASE_MISTAKE_CHANCE){
      const target = snake[0];
      const dx = wrappedDelta(head.x, target.x, WORLD_W);
      const dy = wrappedDelta(head.y, target.y, WORLD_H);
      if (Math.abs(dx) >= Math.abs(dy)){
        if (dx !== 0) candidates.push({x: dx > 0 ? 1 : -1, y:0});
        if (dy !== 0) candidates.push({x:0, y: dy > 0 ? 1 : -1});
      } else {
        if (dy !== 0) candidates.push({x:0, y: dy > 0 ? 1 : -1});
        if (dx !== 0) candidates.push({x: dx > 0 ? 1 : -1, y:0});
      }
    }
    // wandering, or a chase "mistake": just move randomly instead of tracking
    [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].sort(() => Math.random()-0.5).forEach(d => candidates.push(d));

    for (const d of candidates){
      const nx = wrap(head.x + d.x, WORLD_W), ny = wrap(head.y + d.y, WORLD_H);
      if (obstacles.has(key(nx, ny))) continue;
      if (enemy.some(s => s.x === nx && s.y === ny)) continue;
      enemy.unshift({x:nx, y:ny});
      enemy.pop();
      enemyDir = d;
      return;
    }
  }

  function updateCamera(){
    const head = snake[0];
    cam = {
      x: wrap(head.x - Math.floor(VIEW/2), WORLD_W),
      y: wrap(head.y - Math.floor(VIEW/2), WORLD_H),
    };
    sectorLabel.textContent = 'SECTOR: ' + String(cam.x).padStart(2,'0') + ',' + String(cam.y).padStart(2,'0');
  }

  // shortest wrapped distance from a world coordinate to the camera's corner, for toroidal rendering
  function wrappedOffset(coord, camCoord, size){
    return wrap(coord - camCoord, size);
  }

  function inView(x, y){
    return wrappedOffset(x, cam.x, WORLD_W) < VIEW && wrappedOffset(y, cam.y, WORLD_H) < VIEW;
  }

  function drawCell(wx, wy, color, inset){
    if (!inView(wx, wy)) return;
    const sx = wrappedOffset(wx, cam.x, WORLD_W) * CELL;
    const sy = wrappedOffset(wy, cam.y, WORLD_H) * CELL;
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.fillRect(sx+inset, sy+inset, CELL-inset*2, CELL-inset*2);
  }

  function draw(){
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#040904';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(57,255,106,0.07)';
    for (let i = 1; i < VIEW; i++){
      ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
    }

    ctx.shadowBlur = 3;
    obstacles.forEach(k => {
      const [ox, oy] = k.split(',').map(Number);
      drawCell(ox, oy, '#45454A', 1);
    });

    ctx.shadowBlur = 4;
    poisonFoods.forEach(p => drawCell(p.x, p.y, '#FF3B3B', 3));

    snake.forEach((s, i) => {
      ctx.globalAlpha = i === 0 ? 1 : 0.85;
      drawCell(s.x, s.y, '#39FF6A', 1);
    });
    ctx.globalAlpha = 1;

    goodFoods.forEach(f => drawCell(f.x, f.y, '#FFB300', 3));
    powerFoods.forEach(f => drawCell(f.x, f.y, '#33B5FF', 3));

    const isPowered = tickCount < poweredUntilTick;
    const isEnding = isPowered && (poweredUntilTick - tickCount) < POWER_ENDING_WINDOW;
    const showPowered = isEnding ? (tickCount % 4 < 2) : isPowered;
    gameBox.classList.toggle('powered', showPowered);
    ctx.shadowBlur = 4;
    enemy.forEach((s, i) => {
      ctx.globalAlpha = (i === 0 ? 1 : 0.8) * (enemyState === 'wander' ? 0.45 : 1);
      const flashing = isPowered && (tickCount % 6 < 3);
      drawCell(s.x, s.y, flashing ? '#CFEFFF' : '#1B5E20', 1);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function step(){
    if (!running) return;
    dir = nextDir;
    tickCount++;
    msgEl.textContent = '';

    const head = { x: wrap(snake[0].x + dir.x, WORLD_W), y: wrap(snake[0].y + dir.y, WORLD_H) };

    if (obstacles.has(key(head.x, head.y)) || snake.some(s => s.x === head.x && s.y === head.y)){
      gameOver('GAME OVER — PRESS R TO RESTART');
      return;
    }

    const poisonIndex = poisonFoods.findIndex(p => p.x === head.x && p.y === head.y);
    if (poisonIndex !== -1){
      if (snake.length <= 1){
        snake.unshift(head);
        updateCamera();
        draw();
        gameOver('NOTHING LEFT TO LOSE — PRESS R TO RESTART');
        return;
      }
      snake.unshift(head);
      snake.pop();   // ordinary movement consumes the tail
      snake.pop();   // losing a red one costs you an extra segment of mass
      score = Math.max(0, score - 1);
      scoreLabel.textContent = 'SCORE: ' + String(score).padStart(3, '0');
      poisonFoods[poisonIndex] = randomFreeCell();
      updateCamera();
      draw();
      return;
    }

    snake.unshift(head);
    const eatenIndex = goodFoods.findIndex(f => f.x === head.x && f.y === head.y);
    if (eatenIndex !== -1){
      score++;
      scoreLabel.textContent = 'SCORE: ' + String(score).padStart(3, '0');
      goodFoods[eatenIndex] = randomFreeCell();
    } else {
      snake.pop();
    }

    const powerIndex = powerFoods.findIndex(f => f.x === head.x && f.y === head.y);
    if (powerIndex !== -1){
      poweredUntilTick = tickCount + POWER_DURATION;
      powerFoods[powerIndex] = randomFreeCell();
      msgEl.textContent = 'POWERED UP — HUNT THE DARK ONE';
    }

    if (tickCount % 2 === 0){ moveGoodFoods(); movePoisonFoods(); }

    moveEnemy();

    if (biteCooldown > 0) biteCooldown--;
    const bitten = biteCooldown <= 0 && enemy.some(e => snake.some(s => s.x === e.x && s.y === e.y));
    if (bitten){
      const powered = tickCount < poweredUntilTick;
      if (powered){
        growSnake(BITE_PENALTY);
        score += 1;
        scoreLabel.textContent = 'SCORE: ' + String(score).padStart(3, '0');
        const occupiedNow = new Set(snake.map(s => key(s.x, s.y)));
        spawnEnemy(occupiedNow);
        msgEl.textContent = 'YOU ATE THE DARK ONE — GREW + 1 PT';
      } else if (snake.length <= BITE_PENALTY){
        updateCamera();
        draw();
        gameOver('THE DARK ONE CAUGHT YOU — PRESS R TO RESTART');
        return;
      } else {
        for (let i = 0; i < BITE_PENALTY; i++) snake.pop();
        growEnemy(1);
        biteCooldown = 15; // brief grace period so it can't bite again before you can react
        enemyState = 'retreat';
        enemyTimer = 2; // backs off 2 moves before resuming normal behavior
        msgEl.textContent = 'BITTEN — LOST ' + BITE_PENALTY + ' SEGMENTS';
      }
    }

    updateCamera();
    draw();
  }

  function gameOver(message){
    running = false;
    clearInterval(loopId);
    msgEl.textContent = message;
    showLeaderboard(score);
  }

  // ---------- leaderboard (Firebase Firestore) ----------
  const firebaseConfig = {
    apiKey: "AIzaSyDCQa56TzZ5ayBplG8JO2CdqgJnvAziWP0",
    authDomain: "steven-portfolio-1fbf7.firebaseapp.com",
    databaseURL: "https://steven-portfolio-1fbf7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "steven-portfolio-1fbf7",
    storageBucket: "steven-portfolio-1fbf7.firebasestorage.app",
    messagingSenderId: "1010377020871",
    appId: "1:1010377020871:web:02aa0bbb27e249d805b5e2"
  };
  let db = null;
  try {
    if (window.firebase && firebase.apps && !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    if (window.firebase) db = firebase.firestore();
  } catch (e) { console.warn('Leaderboard unavailable:', e); }

  const lbPanel = document.getElementById('lbPanel');
  const lbForm = document.getElementById('lbForm');
  const lbNameInput = document.getElementById('lbNameInput');
  const lbList = document.getElementById('lbList');
  const lbStatus = document.getElementById('lbStatus');
  let scoreSubmittedThisRun = false;

  function renderLeaderboard(docs){
    lbList.innerHTML = docs.map((d, i) =>
      `<li><span class="lb-rank">${i+1}.</span><span class="lb-name">${d.name}</span><span class="lb-score">${String(d.score).padStart(3,'0')}</span></li>`
    ).join('') || '<li class="dim">NO SCORES YET</li>';
  }

  function fetchTopScores(){
    if (!db) { lbList.innerHTML = '<li class="dim">LEADERBOARD OFFLINE</li>'; return; }
    // fetch a larger pool, then collapse repeat names down to their single best score
    // so one person resubmitting the same name can't fill every slot and crowd out others
    db.collection('snakeScores').orderBy('score', 'desc').limit(50).get()
      .then(snap => {
        const seen = new Set();
        const docs = [];
        snap.forEach(doc => {
          const d = doc.data();
          const key = (d.name || '').trim().toUpperCase();
          if (seen.has(key)) return;
          seen.add(key);
          docs.push(d);
        });
        renderLeaderboard(docs.slice(0, 5));
      })
      .catch(err => { console.warn(err); lbList.innerHTML = '<li class="dim">LEADERBOARD OFFLINE</li>'; });
  }

  function showLeaderboard(finalScore){
    lbPanel.hidden = false;
    lbStatus.textContent = '';
    fetchTopScores();
    if (finalScore > 0 && !scoreSubmittedThisRun){
      lbForm.hidden = false;
      setTimeout(() => lbNameInput.focus(), 50);
    } else {
      lbForm.hidden = true;
    }
  }

  lbForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = lbNameInput.value.trim().toUpperCase().slice(0, 12);
    if (!name){ lbStatus.textContent = '> ENTER A NAME FIRST'; return; }
    if (!db){ lbStatus.textContent = '> LEADERBOARD OFFLINE'; return; }
    lbStatus.textContent = '> SUBMITTING...';
    db.collection('snakeScores').add({ name, score: Math.round(score), ts: Date.now() })
      .then(() => {
        scoreSubmittedThisRun = true;
        lbForm.hidden = true;
        lbStatus.textContent = '> SCORE LOGGED';
        fetchTopScores();
      })
      .catch(err => { console.warn(err); lbStatus.textContent = '> SUBMIT FAILED'; });
  });

  function startLoop(){
    clearInterval(loopId);
    loopId = setInterval(step, 110);
  }

  const dirMap = {
    up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0},
  };
  document.getElementById('dpad').querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const m = dirMap[btn.dataset.dir];
      if (!running){ resetGame(); draw(); startLoop(); return; }
      if (m && !(m.x === -dir.x && m.y === -dir.y)) nextDir = m;
    });
  });
  msgEl.addEventListener('click', () => {
    if (!running){ resetGame(); draw(); startLoop(); }
  });

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (!running && k === 'r'){ resetGame(); draw(); startLoop(); return; }
    const map = {
      arrowup:{x:0,y:-1}, w:{x:0,y:-1},
      arrowdown:{x:0,y:1}, s:{x:0,y:1},
      arrowleft:{x:-1,y:0}, a:{x:-1,y:0},
      arrowright:{x:1,y:0}, d:{x:1,y:0},
    };
    const k2 = e.key === 'ArrowUp' ? 'arrowup' : e.key === 'ArrowDown' ? 'arrowdown' :
                e.key === 'ArrowLeft' ? 'arrowleft' : e.key === 'ArrowRight' ? 'arrowright' : k;
    const m = map[k2];
    if (m && !(m.x === -dir.x && m.y === -dir.y)){
      nextDir = m;
      e.preventDefault();
    }
  });


  // auto-start since this file is just the game itself
  resetGame();
  draw();
  startLoop();

</script>

</body>
</html>
